{% extends "base.html" %}
{% block title %}Edit PCR Program{% endblock %}
{% block content %}
<h2>🧪 Edit PCR Program: {{ program.program_name }}</h2>

<!-- ===== Chart ===== -->
<div class="card mb-4">
    <div class="card-header">
        <strong>📈 Temperature Profile</strong>
        <button class="btn btn-sm btn-outline-secondary float-end no-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="card-body">
        <canvas id="pcrChart" height="150"></canvas>
    </div>
</div>

<!-- ===== Edit Form ===== -->
<form method="POST">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Program Name</label>
            <input type="text" class="form-control" name="program_name" value="{{ program.program_name }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Type</label>
            <select class="form-select" name="program_type">
                <option value="qPCR" {% if program.program_type=='qPCR' %}selected{% endif %}>qPCR</option>
                <option value="Conventional" {% if program.program_type=='Conventional' %}selected{% endif %}>Conventional</option>
                <option value="RT-PCR" {% if program.program_type=='RT-PCR' %}selected{% endif %}>RT-PCR</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Reaction Volume (µL)</label>
            <input type="number" step="0.1" class="form-control" name="reaction_volume" value="{{ program.reaction_volume or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Master Mix</label>
            <input type="text" class="form-control" name="master_mix" value="{{ program.master_mix or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Notes</label>
            <input type="text" class="form-control" name="notes" value="{{ program.notes or '' }}">
        </div>
    </div>

    <h5 class="mt-4">Steps</h5>
    <div id="stepsContainer">
        {% for step in steps %}
        <div class="row g-2 mb-2 step-row">
            <div class="col-md-3">
                <input type="text" class="form-control" name="step_type[]" placeholder="Type" value="{{ step.step_type }}" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.1" class="form-control" name="temperature[]" placeholder="Temp °C" value="{{ step.temperature or '' }}">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" name="duration_sec[]" placeholder="Time sec" value="{{ step.duration_sec or '' }}">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" name="cycle_repeat[]" placeholder="Cycles" value="{{ step.cycle_repeat or '' }}">
            </div>
            <div class="col-md-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_read_step[]" {% if step.is_read_step %}checked{% endif %}> Read
                </div>
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-danger btn-sm" onclick="removeStep(this)">✕</button>
            </div>
        </div>
        {% endfor %}
    </div>
    <button type="button" class="btn btn-secondary btn-sm" onclick="addStep()">+ Add Step</button>

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save Program</button>
        <a href="{{ url_for('primer_detail', primer_id=primer_id) }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Prepare chart data from server
    const chartData = {
        labels: {{ steps | map(attribute='step_order') | list | tojson }},
        temperatures: {{ steps | map(attribute='temperature') | list | tojson }},
        durations: {{ steps | map(attribute='duration_sec') | list | tojson }},
        types: {{ steps | map(attribute='step_type') | list | tojson }}
    };

    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('pcrChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels.map(i => 'Step ' + i),
                datasets: [{
                    label: 'Temperature (°C)',
                    data: chartData.temperatures,
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: 'rgb(54, 162, 235)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        title: { display: true, text: 'Temperature (°C)' },
                        min: 0,
                        max: Math.max(...chartData.temperatures) + 10 || 100
                    },
                    x: {
                        title: { display: true, text: 'Step Order' }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const idx = context.dataIndex;
                                return [
                                    `Temp: ${chartData.temperatures[idx] || 'N/A'} °C`,
                                    `Time: ${chartData.durations[idx] || 'N/A'} sec`,
                                    `Type: ${chartData.types[idx] || 'N/A'}`
                                ];
                            }
                        }
                    }
                }
            }
        });
    });

    // Step management
    function addStep() {
        const container = document.getElementById('stepsContainer');
        const row = document.createElement('div');
        row.className = 'row g-2 mb-2 step-row';
        row.innerHTML = `
            <div class="col-md-3"><input type="text" class="form-control" name="step_type[]" placeholder="Type" required></div>
            <div class="col-md-2"><input type="number" step="0.1" class="form-control" name="temperature[]" placeholder="Temp °C"></div>
            <div class="col-md-2"><input type="number" class="form-control" name="duration_sec[]" placeholder="Time sec"></div>
            <div class="col-md-2"><input type="number" class="form-control" name="cycle_repeat[]" placeholder="Cycles"></div>
            <div class="col-md-2"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_read_step[]"> Read</div></div>
            <div class="col-md-1"><button type="button" class="btn btn-danger btn-sm" onclick="removeStep(this)">✕</button></div>
        `;
        container.appendChild(row);
    }

    function removeStep(btn) {
        if (document.querySelectorAll('.step-row').length > 1) {
            btn.closest('.step-row').remove();
        } else {
            alert('At least one step is required.');
        }
    }
</script>

<style>
    @media print {
        #pcrChart { max-width: 100% !important; height: auto !important; }
        .btn, .no-print { display: none !important; }
    }
</style>
{% endblock %}
