{% extends "base.html" %}
{% block title %}Edit PCR Program{% endblock %}
{% block content %}
<h2>🧪 Edit PCR Program: {{ program.program_name }}</h2>

<!-- ===== Chart ===== -->
<div class="card mb-4">
    <div class="card-header">
        <strong>📈 Temperature Profile</strong>
        <button class="btn btn-sm btn-outline-secondary float-end no-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="card-body">
        <canvas id="pcrChart" height="150"></canvas>
    </div>
</div>

<!-- ===== Edit Form ===== -->
<form method="POST">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Program Name</label>
            <input type="text" class="form-control" name="program_name" value="{{ program.program_name }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Type</label>
            <select class="form-select" name="program_type">
                <option value="qPCR" {% if program.program_type=='qPCR' %}selected{% endif %}>qPCR</option>
                <option value="Conventional" {% if program.program_type=='Conventional' %}selected{% endif %}>Conventional</option>
                <option value="RT-PCR" {% if program.program_type=='RT-PCR' %}selected{% endif %}>RT-PCR</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Reaction Volume (µL)</label>
            <input type="number" step="0.1" class="form-control" name="reaction_volume" value="{{ program.reaction_volume or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Master Mix</label>
            <input type="text" class="form-control" name="master_mix" value="{{ program.master_mix or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Notes</label>
            <input type="text" class="form-control" name="notes" value="{{ program.notes or '' }}">
        </div>
    </div>

    <h5 class="mt-4">Steps & Cycles</h5>
    <div id="stepsContainer">
        {% for step in steps %}
        <div class="row g-2 mb-2 step-row">
            <div class="col-md-2">
                <input type="text" class="form-control" name="step_type[]" placeholder="Type" value="{{ step.step_type }}" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.1" class="form-control" name="temperature[]" placeholder="Temp °C" value="{{ step.temperature or '' }}">
            </div>
            <div class="col-md-1">
                <input type="number" class="form-control" name="duration_min[]" placeholder="Min" value="{{ (step.duration_sec // 60) if step.duration_sec else '' }}" min="0">
            </div>
            <div class="col-md-1">
                <input type="number" class="form-control" name="duration_sec[]" placeholder="Sec" value="{{ (step.duration_sec % 60) if step.duration_sec else '' }}" min="0" max="59">
            </div>
            <div class="col-md-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_read_step[]" {% if step.is_read_step %}checked{% endif %}> Read
                </div>
            </div>
            <div class="col-md-2">
                <select class="form-select" name="cycle_group[]">
                    <option value="">No Cycle</option>
                    {% for group in cycle_groups %}
                        <option value="{{ group.cycle_number }}" {% if step.cycle_group_id == group.id %}selected{% endif %}>
                            Cycle {{ group.cycle_number }} ({{ group.repeat_count }}x)
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-danger btn-sm" onclick="removeStep(this)">✕</button>
            </div>
            <div class="col-md-1">
                <input type="hidden" name="cycle_repeat[]" value="1">
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="mt-2">
        <button type="button" class="btn btn-secondary btn-sm" onclick="addStep()">+ Add Step</button>
        <button type="button" class="btn btn-outline-primary btn-sm" onclick="startCycle()">⏺ Start Cycle</button>
        <button type="button" class="btn btn-outline-danger btn-sm" onclick="endCycle()">⏹ End Cycle</button>
        <button type="button" class="btn btn-outline-warning btn-sm" onclick="setCycleRepeat()">🔁 Set Cycle Repeat</button>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save Program</button>
        <a href="{{ url_for('primer_detail', primer_id=primer_id) }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const chartData = {
        labels: {{ steps | map(attribute='step_order') | list | tojson }},
        temperatures: {{ steps | map(attribute='temperature') | list | tojson }},
        durations: {{ steps | map(attribute='duration_sec') | list | tojson }},
        types: {{ steps | map(attribute='step_type') | list | tojson }}
    };

    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('pcrChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels.map(i => 'Step ' + i),
                datasets: [{
                    label: 'Temperature (°C)',
                    data: chartData.temperatures,
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: 'rgb(54, 162, 235)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        title: { display: true, text: 'Temperature (°C)' },
                        min: 0,
                        max: Math.max(...chartData.temperatures) + 10 || 100
                    },
                    x: {
                        title: { display: true, text: 'Step Order' }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const idx = context.dataIndex;
                                const secs = chartData.durations[idx] || 0;
                                const mins = Math.floor(secs / 60);
                                const remainingSecs = secs % 60;
                                let timeStr = '';
                                if (mins > 0) timeStr += `${mins}m `;
                                timeStr += `${remainingSecs}s`;
                                return [
                                    `Temp: ${chartData.temperatures[idx] || 'N/A'} °C`,
                                    `Time: ${timeStr}`,
                                    `Type: ${chartData.types[idx] || 'N/A'}`
                                ];
                            }
                        }
                    }
                }
            }
        });
    });

    let cycleCounter = {{ cycle_groups|length + 1 if cycle_groups else 1 }};
    let currentCycle = null;

    function addStep() {
        const container = document.getElementById('stepsContainer');
        const row = document.createElement('div');
        row.className = 'row g-2 mb-2 step-row';
        const cycleOptions = document.querySelector('.step-row:last-child')?.querySelector('select[name="cycle_group[]"]')?.innerHTML || '';
        row.innerHTML = `
            <div class="col-md-2"><input type="text" class="form-control" name="step_type[]" placeholder="Type" required></div>
            <div class="col-md-2"><input type="number" step="0.1" class="form-control" name="temperature[]" placeholder="Temp °C"></div>
            <div class="col-md-1"><input type="number" class="form-control" name="duration_min[]" placeholder="Min" min="0"></div>
            <div class="col-md-1"><input type="number" class="form-control" name="duration_sec[]" placeholder="Sec" min="0" max="59"></div>
            <div class="col-md-2"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_read_step[]"> Read</div></div>
            <div class="col-md-2">
                <select class="form-select" name="cycle_group[]">
                    <option value="">No Cycle</option>
                    ${cycleOptions}
                </select>
            </div>
            <div class="col-md-1"><button type="button" class="btn btn-danger btn-sm" onclick="removeStep(this)">✕</button></div>
            <div class="col-md-1"><input type="hidden" name="cycle_repeat[]" value="1"></div>
        `;
        container.appendChild(row);
        updateCycleSelectors();
    }

    function removeStep(btn) {
        if (document.querySelectorAll('.step-row').length > 1) {
            btn.closest('.step-row').remove();
            updateCycleSelectors();
        } else {
            alert('At least one step is required.');
        }
    }

    function startCycle() {
        const newCycle = cycleCounter++;
        const lastRow = document.querySelector('.step-row:last-child');
        if (!lastRow) {
            alert('Please add at least one step first.');
            return;
        }
        const select = lastRow.querySelector('select[name="cycle_group[]"]');
        const option = document.createElement('option');
        option.value = newCycle;
        option.text = `Cycle ${newCycle} (1x)`;
        option.selected = true;
        select.appendChild(option);
        currentCycle = newCycle;
        updateCycleSelectors();
        alert(`Cycle ${newCycle} started. Add steps to this cycle.`);
    }

    function endCycle() {
        currentCycle = null;
        alert('Cycle ended. Next steps will not belong to a cycle group.');
    }

    function setCycleRepeat() {
        const cycleNum = prompt('Enter cycle number to set repeat count:');
        if (!cycleNum) return;
        const repeatCount = prompt('Enter number of repetitions:');
        if (!repeatCount || parseInt(repeatCount) < 1) {
            alert('Invalid repeat count.');
            return;
        }
        const selects = document.querySelectorAll('select[name="cycle_group[]"]');
        selects.forEach(select => {
            Array.from(select.options).forEach(opt => {
                if (opt.value === cycleNum) {
                    opt.text = `Cycle ${cycleNum} (${repeatCount}x)`;
                }
            });
        });
        document.querySelectorAll('input[name="cycle_repeat[]"]').forEach((input, index) => {
            const select = document.querySelectorAll('select[name="cycle_group[]"]')[index];
            if (select && select.value === cycleNum) {
                input.value = repeatCount;
            }
        });
        alert(`Cycle ${cycleNum} repeat set to ${repeatCount}x.`);
    }

    function updateCycleSelectors() {
        document.querySelectorAll('select[name="cycle_group[]"]').forEach((select, index) => {
            const hidden = document.querySelectorAll('input[name="cycle_repeat[]"]')[index];
            if (hidden) {
                const selectedOption = select.options[select.selectedIndex];
                if (selectedOption && selectedOption.value) {
                    const match = selectedOption.text.match(/\((\d+)x\)/);
                    if (match) {
                        hidden.value = match[1];
                    }
                }
            }
        });
    }

    document.addEventListener('change', function(e) {
        if (e.target.name === 'cycle_group[]') {
            updateCycleSelectors();
        }
    });
</script>

<style>
    @media print {
        #pcrChart { max-width: 100% !important; height: auto !important; }
        .btn, .no-print { display: none !important; }
    }
</style>
{% endblock %}
