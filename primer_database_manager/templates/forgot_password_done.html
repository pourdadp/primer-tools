{% extends "base.html" %}
{% block title %}Request Submitted{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">✅ Request Submitted</h4>
            </div>
            <div class="card-body">
                <p>Your password reset request has been sent to the admin.</p>
                <p>You will be contacted shortly with further instructions.</p>
                <a href="{{ url_for('login') }}" class="btn btn-primary">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
